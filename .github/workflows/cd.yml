---
name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Analyze commits and determine if release is needed
  check-release:
    name: Analyze commits for release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.parse.outputs.should_release }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a  # v4.2.0
        with:
          install-only: true

      - name: Parse release decision
        id: parse
        run: |
          VERSION="$(cog bump --auto --disable-bump-commit --dry-run)" || true
          echo "Detected version: $VERSION"
          if [ -n "$VERSION" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  # Create git tag (only if release needed)
  create-tag:
    name: Create release tag
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Create version tag
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a  # v4.2.0
        with:
          command: bump
          args: --auto --disable-bump-commit
          git-user: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'

      - name: Push tag to repository
        uses: ad-m/github-push-action@77c5b412c50b723d2a4fbc6d71fb5723bcd439aa  # v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true

  # Build and push Docker image (only if tag created)
  build-and-push:
    name: Build and Push Image
    needs: [check-release, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.check-release.outputs.version }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thurbeen/claude-code-job:${{ needs.check-release.outputs.version }}
            ghcr.io/thurbeen/claude-code-job:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate changelog and publish GitHub Release
  publish:
    name: Publish GitHub Release
    needs: [check-release, create-tag, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.check-release.outputs.version }}
          fetch-depth: 0

      - name: Generate changelog
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a  # v4.2.0
        id: changelog
        with:
          command: changelog
          args: --at ${{ needs.check-release.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ needs.check-release.outputs.version }}
          name: claude-code-job ${{ needs.check-release.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.stdout || '## Changes

            See commit history for details.' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
